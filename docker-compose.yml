version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: nichenest-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nichenest
      MYSQL_USER: nichenest
      MYSQL_PASSWORD: nichenest123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./data/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - nichenest-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # PHP Application
  app:
    build: .
    container_name: nichenest-app
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      - DB_HOST=mysql
      - DB_NAME=nichenest
      - DB_USER=nichenest
      - DB_PASS=nichenest123
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./public/uploads:/var/www/html/public/uploads
    networks:
      - nichenest-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # phpMyAdmin (Optional - for database management)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: nichenest-phpmyadmin
    restart: unless-stopped
    ports:
      - "8082:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - mysql
    networks:
      - nichenest-network

volumes:
  mysql_data:

networks:
  nichenest-network:
    driver: bridge
